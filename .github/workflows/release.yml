# Signed + notarized macOS release. Gated on Apple Developer enrollment:
# the secrets below are set once enrollment completes, then a tag ships a DMG
# to GitHub Releases and electron-updater picks it up.
#
# Required repo secrets:
#   CSC_LINK              base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD      the .p12 password
#   APPLE_ID              notarization Apple ID
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password for notarytool
#   APPLE_TEAM_ID         the team id
name: release

on:
  push:
    tags: ["v*"]

jobs:
  mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Build, sign, notarize, publish
        working-directory: app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
